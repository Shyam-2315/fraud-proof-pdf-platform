upstream pdfcraft_frontend {
    server frontend:80;
}

upstream pdfcraft_backend {
    server backend:8025;
}

upstream pdfcraft_admin_frontend {
    server admin-frontend:3035;
}

server {
    listen 80;
    server_name pdfcraft.your-domain.com;

    location / {
        proxy_pass http://pdfcraft_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name admin.pdfcraft.your-domain.com;

    location / {
        proxy_pass http://pdfcraft_admin_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name api.pdfcraft.your-domain.com;

    location / {
        proxy_pass http://pdfcraft_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# TLS option:
# Add certificates under /etc/nginx/certs, listen on 443 ssl, and redirect 80 -> 443.
# The docker-compose production file mounts fraud_pdf_proxy_certs for this purpose.
